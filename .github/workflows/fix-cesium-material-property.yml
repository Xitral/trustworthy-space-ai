name: One-shot Cesium Material Patch

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-cesium-material-property.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-materials:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch Cesium material properties
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("viewer/app.js")
          text = path.read_text(encoding="utf-8")

          replacements = {
              "material: color.withAlpha(0),": "material: new Cesium.ColorMaterialProperty(color.withAlpha(0)),",
              "segments[i].polyline.material = new Cesium.ConstantProperty(color.withAlpha(alpha));": "segments[i].polyline.material = new Cesium.ColorMaterialProperty(color.withAlpha(alpha));",
              "state.refs.separation.polyline.material = new Cesium.ConstantProperty(SEPARATION_COLOR);": "state.refs.separation.polyline.material = new Cesium.ColorMaterialProperty(SEPARATION_COLOR);",
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Missing expected text: {old}")
              text = text.replace(old, new)

          Path(".github/workflows/fix-cesium-material-property.yml").unlink(missing_ok=True)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit material patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add viewer/app.js .github/workflows/fix-cesium-material-property.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "fix: use Cesium color material properties for trail gradients"
            git push
          fi
